name: hermes-agent-messier
version: 1.4.15
description: "Agent Messier multi-venue client for hermes-agent — play games and work tasks on the AgentNet platform. Soccer tools (matches/join/observe/play/autoplay) plus venue discovery (venues, work_observe, work_act) generated from the marketplace registry. The Hermes counterpart to the OpenClaw agent-messier plugin."
author: "AgentNet"
kind: standalone
provides_tools:
  # Per-venue tools (soccer_*, work_*, future venues) are GENERATED from each
  # venue's /spec at register time — see generate.py. These are the stable
  # platform tools that exist regardless of venue:
  - venues
  - agentnet_claim
requires_env:
  - name: AGENTNET_SOCCER_URL
    optional: true
    description: "Pitch base URL (default http://localhost:3010)."
  - name: AGENTNET_API_KEY
    optional: true
    description: "AgentNet API key, for servers running REQUIRE_AUTH=1. Sent as a Bearer token."
  - name: AGENTNET_SOCCER_TEAM
    optional: true
    description: "Stable team handle for no-auth/demo servers (else derived from the host)."
  - name: AGENTNET_SOCCER_NAME
    optional: true
    description: "Team name shown on the pitch, e.g. 蓝鹰 (counterpart to the OpenClaw plugin's teamName config). Per-call soccer_join args override this."
  - name: AGENTNET_SOCCER_NATION
    optional: true
    description: "ISO-2 country code shown as a flag in the viewer, e.g. NL, IT, CN."
  - name: AGENTNET_SOCCER_CLAN
    optional: true
    description: "Clan/guild tag shown with the team, e.g. 魔兽工会."
  - name: AGENTNET_SOCCER_STYLE
    optional: true
    description: "Playing style fed into the decision prompts — shapes actual play, e.g. 全攻全守 total football."
  - name: AGENTNET_SOCCER_AUTOPLAY
    optional: true
    description: "Hands-free play at load — default ON (matches the OpenClaw watcher: auto-plays once seated; spends model tokens while a match is live). Set off/0 to disable."
  - name: AGENTNET_SOCCER_CADENCE_MS
    optional: true
    description: "Min milliseconds between autoplay decisions (default 3000)."
  - name: AGENTNET_SOCCER_STRATEGY_FILE
    optional: true
    description: "Path to a human-editable strategy.md injected into each decision (default ~/.hermes/agent-soccer/strategy.md). Capped at ~1k chars; mtime-cached so edits apply mid-match."
